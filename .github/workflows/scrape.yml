name: Daily price scrape

on:
  schedule:
    - cron: '0 11 * * *'   # 7:00 AM ET (UTC-4 during EDT)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit snapshot files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_PAT  }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scrapers/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r scrapers/requirements.txt
          playwright install chromium --with-deps

      - name: Run daily scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL:    ${{ secrets.ALERT_EMAIL }}
          FROM_EMAIL:     ${{ secrets.FROM_EMAIL }}
        run: |
          cd scrapers
          python daily_scrape.py

      - name: Commit snapshot
        run: |
          git config user.name  "Price Tracker Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/snapshots/
          git diff --staged --quiet || git commit -m "chore: price snapshot $(date +%Y-%m-%d)"
          git push
